<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT用語辞典</title>

  <script src="script.js" defer></script>

 <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- ===== ヘッダー ===== -->

  <header>

    <h1>IT用語辞典</h1>

    <p>
      当サイトは個人の趣味で運営しています。<br>
      掲載内容の正確性・完全性を保証するものではありません。<br>
      当サイトの情報を利用したことによって生じた損害について、
      製作者は一切の責任を負いません。
    </p>

  </header>

  <!-- ===== メインコンテンツ ===== -->

  <div class="container">

    <!-- ===== 検索 ===== -->

    <section class="search-box">

      <h2>用語検索</h2>

      <input
        type="text"
        id="searchBox"
        placeholder="例：CPU / HTML / IDS"
      >

      <div id="result">
        ここに検索結果が表示されます。
      </div>

    </section>

    <!-- ===== 用語一覧 ===== -->

    <section class="word-section">

      <h2>用語一覧</h2>

      <ul id="wordList">
        <!-- JavaScriptで用語追加 -->
      </ul>

    </section>

  </div>

  <!-- ===== フッター ===== -->

  <footer>
    IT学習用サイト
  </footer>

</body>
</html>
